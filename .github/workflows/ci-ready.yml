name: ci-ready

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-ready-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  validator-self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/self-test.sh scripts/verification/validate-gate.sh scripts/ci-ready.sh scripts/archive-ready.sh

      - name: Run verification self-tests
        run: |
          scripts/verification/self-test.sh
          scripts/verification/self-test-artifacts.sh

  prerequisite-validation:
    runs-on: ubuntu-latest
    needs: validator-self-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/*.sh scripts/ci-ready.sh scripts/archive-ready.sh

      - name: Run prerequisite validation
        run: scripts/verification/run-prerequisites.sh

  unit-and-integration:
    runs-on: ubuntu-latest
    needs: prerequisite-validation
    env:
      TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/*.sh scripts/ci-ready.sh scripts/archive-ready.sh

      - name: Run unit harness
        run: scripts/verification/run-unit.sh "$TARGET_SHA"

      - name: Run integration harness
        run: scripts/verification/run-integration.sh "$TARGET_SHA"

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-integration-evidence-${{ env.TARGET_SHA }}
          path: artifacts/verification/${{ env.TARGET_SHA }}/
          if-no-files-found: ignore

  ci-ready-gate:
    runs-on: ubuntu-latest
    needs: unit-and-integration
    env:
      TARGET_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Download verification evidence
        uses: actions/download-artifact@v4
        with:
          name: unit-integration-evidence-${{ env.TARGET_SHA }}
          path: artifacts/verification/${{ env.TARGET_SHA }}/

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/validate-gate.sh scripts/ci-ready.sh

      - name: Validate CI gate for current commit
        run: scripts/ci-ready.sh --commit-sha "$TARGET_SHA"
