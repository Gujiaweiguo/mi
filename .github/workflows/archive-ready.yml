name: archive-ready

on:
  workflow_dispatch:

jobs:
  validator-self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/self-test.sh scripts/verification/self-test-release-readiness.sh scripts/verification/validate-gate.sh scripts/verification/validate-release-readiness.sh scripts/ci-ready.sh scripts/archive-ready.sh scripts/release-ready.sh

      - name: Run verification self-tests
        run: |
          scripts/verification/self-test.sh
          scripts/verification/self-test-release-readiness.sh
          scripts/verification/self-test-artifacts.sh

  prerequisite-validation:
    runs-on: ubuntu-latest
    needs: validator-self-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/*.sh scripts/ci-ready.sh scripts/archive-ready.sh

      - name: Run prerequisite validation
        run: scripts/verification/run-prerequisites.sh

  full-test-suite:
    runs-on: ubuntu-latest
    needs: prerequisite-validation
    env:
      TARGET_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/*.sh scripts/ci-ready.sh scripts/archive-ready.sh

      - name: Run unit harness
        run: scripts/verification/run-unit.sh "$TARGET_SHA"

      - name: Run integration harness
        run: scripts/verification/run-integration.sh "$TARGET_SHA"

      - name: Run mocked e2e harness
        run: scripts/verification/run-e2e.sh "$TARGET_SHA"

      - name: Run live-stack e2e harness
        run: scripts/verification/run-e2e-live.sh "$TARGET_SHA"

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-verification-evidence-${{ env.TARGET_SHA }}
          path: artifacts/verification/${{ env.TARGET_SHA }}/
          if-no-files-found: ignore

  archive-ready-gate:
    runs-on: ubuntu-latest
    needs: full-test-suite
    env:
      TARGET_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download verification evidence
        uses: actions/download-artifact@v4
        with:
          name: full-verification-evidence-${{ env.TARGET_SHA }}
          path: artifacts/verification/${{ env.TARGET_SHA }}/

      - name: Make verification scripts executable
        run: chmod +x scripts/verification/validate-gate.sh scripts/archive-ready.sh

      - name: Validate archive gate for current commit
        run: scripts/archive-ready.sh --commit-sha "$TARGET_SHA"
