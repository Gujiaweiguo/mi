app:
  name: mi-backend
  environment: production

server:
  host: 0.0.0.0
  port: 5180
  read_timeout_seconds: 15
  write_timeout_seconds: 15

database:
  host: mysql
  port: 3306
  name: mi_prod
  user: mi_prod
  password: change-me
  ssl_mode: disable

auth:
  jwt_secret: change-me-production-secret
  token_expiry_seconds: 3600

log:
  level: info

storage:
  generated_documents_path: /app/generated-documents
  uploads_path: /app/uploads
  logs_path: /app/logs

workflow_reminder_scheduler:
  enabled: false
  interval_seconds: 3600
  lock_name: workflow:reminder:scheduler
  lock_wait_seconds: 0
  reminder_type: standard
  min_pending_age_seconds: 86400
  window_truncation_seconds: 86400
