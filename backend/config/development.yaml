app:
  name: mi-backend
  environment: development

server:
  host: 0.0.0.0
  port: 5180
  read_timeout_seconds: 10
  write_timeout_seconds: 10

database:
  host: 127.0.0.1
  port: 3306
  name: mi_dev
  user: mi_dev
  password: devpassword
  ssl_mode: disable

auth:
  jwt_secret: change-me-development-secret
  token_expiry_seconds: 3600

