            - $ref: '#/definitions/handlers.swaggerEnvelope'
            - properties:
                token:
                  type: string
                user:
                  $ref: '#/definitions/auth.User'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.swaggerMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.swaggerMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.swaggerMessageResponse'
