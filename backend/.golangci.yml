version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - revive
    - unused
    - ineffassign
    - staticcheck
    - gocritic
  disable:
    - exhaustruct
    - wrapcheck
  settings:
    revive:
      rules:
        - name: unused-parameter
          severity: warning
    gocritic:
      disabled-checks:
        - appendAssign
        - ifElseChain
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - linters:
          - revive
        text: "unused-parameter"
      - path: ".*_test\\.go"
        linters:
          - errcheck
      - linters:
          - errcheck
        text: "Error return value of `.*\\.Rollback` is not checked"
      - path: ".*_test\\.go"
        linters:
          - staticcheck
        text: "SA1012"
      - path: "internal/http/router\\.go"
        linters:
          - staticcheck
        text: "SA5011"

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
