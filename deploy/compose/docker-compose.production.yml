services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [mi-net]
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${MI_HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    restart: unless-stopped
    networks: [mi-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    restart: "no"
    networks: [mi-net]
    entrypoint: ["/app/dbops"]
    command: ["migrate"]
    environment:
      MI_DATABASE_HOST: ${MI_DATABASE_HOST:-mysql}
      MI_DATABASE_PORT: "3306"
      MI_DATABASE_NAME: ${MYSQL_DATABASE:-mi_prod}
      MI_DATABASE_USER: ${MYSQL_USER:-mi_prod}
      MI_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MI_CONFIG_FILE: ${MI_BACKEND_CONFIG_FILE:-/app/config/production.yaml}
    volumes:
      - ${MI_RUNTIME_CONFIG:-../../backend/config}:/app/config:ro
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [mi-net]
    environment:
      MI_CONFIG_FILE: ${MI_BACKEND_CONFIG_FILE:-/app/config/production.yaml}
      MI_DATABASE_HOST: ${MI_DATABASE_HOST:-mysql}
      MI_DATABASE_PORT: "3306"
      MI_DATABASE_NAME: ${MYSQL_DATABASE:-mi_prod}
      MI_DATABASE_USER: ${MYSQL_USER:-mi_prod}
      MI_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MI_AUTH_JWT_SECRET: ${MI_AUTH_JWT_SECRET:-change-me-production-secret}
    volumes:
      - ${MI_RUNTIME_CONFIG:-../../backend/config}:/app/config:ro
      - ${MI_RUNTIME_LOGS:-../runtime/production/logs}:/app/logs
      - ${MI_RUNTIME_DOCUMENTS:-../runtime/production/documents}:/app/generated-documents
      - ${MI_RUNTIME_UPLOADS:-../runtime/production/uploads}:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${MI_SERVER_PORT:-5180}/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks: [mi-net]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mi_prod}
      MYSQL_USER: ${MYSQL_USER:-mi_prod}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
    volumes:
      - ${MI_RUNTIME_MYSQL:-../runtime/production/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    build:
      context: ../..
      dockerfile: deploy/docker/backup.Dockerfile
    profiles: ["backup"]
    restart: unless-stopped
    networks: [mi-net]
    environment:
      MI_DATABASE_HOST: mysql
      MI_DATABASE_PORT: "3306"
      MI_DATABASE_NAME: ${MYSQL_DATABASE:-mi_prod}
      MI_DATABASE_USER: ${MYSQL_USER:-mi_prod}
      MI_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      BACKUP_DIR: /backups
    volumes:
      - ${MI_RUNTIME_BACKUPS:-./artifacts/backups/production}:/backups
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mi-net:
    driver: bridge
