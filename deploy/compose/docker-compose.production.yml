services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${MI_HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    user: "0:0"
    environment:
      MI_CONFIG_FILE: /app/config/production.yaml
    volumes:
      - ../../backend/config:/app/config:ro
      - ../runtime/production/logs:/app/logs
      - ../runtime/production/documents:/app/generated-documents
      - ../runtime/production/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mi_prod
      MYSQL_USER: mi_prod
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: change-me-root
    ports:
      - "${MI_MYSQL_PORT:-3306}:3306"
    volumes:
      - ../runtime/production/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
